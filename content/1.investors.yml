seo:
  title: Invest in BrytaFoods - Scalable healthy convenience food in Ghana
  description: Partner with BrytaFoods to scale affordable, pre-cooked healthy meals across Ghana and West Africa. Strong unit economics, growing demand, and impact.
navigation: false
hero:
  title: 'Scaling [Convenient]{class="text-primary"} Healthy Meals'
  description: BrytaFoods delivers ready-to-serve, nutritious meals at scale. Join us to expand access, grow revenue, and create measurable impact.
  orientation: 'vertical'
  links:
      - label: Download Investor Deck
        icon: i-lucide-download
        trailing: true
        to: 'https://r2.qbtech.dev/brytafoods/Bryta-Brochure-2.pdf'
        target: '_blank'
        size: xl
partners:
  - name: 'Richard Quaye Foundation',
